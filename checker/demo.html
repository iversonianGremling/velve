<!doctype html><html><head><meta charset="utf-8"><title>velve demo</title></head><body style="margin:0">
<div style="display:flex;flex-direction:column;gap:16px;padding:24px;background:#000000">
  <span style="font-size:24px;font-weight:700;color:#ffffff">Reports</span>
  <div style="display:flex;flex-direction:row;gap:8px">
    <button data-onclick="true" style="font-size:12px;background:#4FC1FF;color:#000000;border-radius:6px">Refresh</button>
  </div>
  <div style="display:flex;flex-direction:column;gap:8px">
    <div style="display:flex;flex-direction:row;gap:12px;padding:8px;background:#0d1117;border-radius:6px">
      <div style="display:flex;flex-direction:column;gap:2px">
        <span style="font-size:14px;font-weight:600;color:#ffffff">Alpha</span>
        <span style="font-size:11px;color:#8b949e">score 91</span>
      </div>
      <span style="font-size:12px;color:#4FC1FF;padding:4px;border-radius:4px;background:#1e2130">active</span>
    </div>
    <div style="display:flex;flex-direction:row;gap:12px;padding:8px;background:#0d1117;border-radius:6px">
      <div style="display:flex;flex-direction:column;gap:2px">
        <span style="font-size:14px;font-weight:600;color:#ffffff">Beta</span>
        <span style="font-size:11px;color:#8b949e">score 64</span>
      </div>
      <span style="font-size:12px;color:#4FC1FF;padding:4px;border-radius:4px;background:#1e2130">active</span>
    </div>
  </div>
</div>

</body></html>
